name: Deploy to Dev EC2

on:
  push:
    branches: [ dev ]   # dev 브랜치에 push될 때만 실행

jobs:
  deploy:
    runs-on: [self-hosted, dev]  # dev 라벨 Runner에서 실행

    steps:
      # 1. 레포 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. 빌드 전 디스크 정리 (빌드 캐시만 제거, 실행 중인 이미지 유지)
      - name: Free disk space
        run: |
          docker builder prune -af
          df -h

      # 4. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 5. Docker 이미지 빌드 & Docker Hub에 push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: yhfmg/deboard-backend:latest
          cache-from: type=registry,ref=yhfmg/deboard-backend:buildcache
          cache-to: type=registry,ref=yhfmg/deboard-backend:buildcache,mode=max

      # 6. 빌드 후 디스크 정리
      - name: Post-build cleanup
        run: |
          docker builder prune -af
          docker image prune -f
          df -h

      # 7. EC2에서 바로 배포 (이미 EC2에서 실행 중이므로 SSH 불필요)
      - name: Deploy
        run: |
          cd /home/myh7754/deboard
          docker pull yhfmg/deboard-backend:latest
          docker compose --profile prod up -d --no-deps backend
          docker image prune -af
          docker builder prune -af

      # 8. Buildx builder 컨테이너 정리 (default 제외한 모든 builder 인스턴스 삭제)
      - name: Cleanup buildx builders
        if: always()
        run: |
          docker buildx ls --format "{{.Name}}" | grep -v "^default$" | xargs -r docker buildx rm || true
