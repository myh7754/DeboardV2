name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: [self-hosted, prod]  # prod 라벨 Runner에서 실행

    steps:
      # 1. 레포 코드 가져오기
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker 이미지 빌드 & Docker Hub에 push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: yhfmg/deboard-backend:latest
          cache-from: type=registry,ref=yhfmg/deboard-backend:buildcache
          cache-to: type=registry,ref=yhfmg/deboard-backend:buildcache,mode=max

      # 6. EC2에서 바로 배포 (이미 EC2에서 실행 중이므로 SSH 불필요)
      - name: Deploy
        run: |
          cd /home/myh7754/deboard
          docker pull yhfmg/deboard-backend:latest
          docker compose up -d --no-deps backend
          docker image prune -f
